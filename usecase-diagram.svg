    <line x1="100" y1="805" x2="300" y2="940"/>
    <line x1="100" y1="790" x2="600" y2="720"/>
    <line x1="100" y1="800" x2="600" y2="830"/>
    <line x1="100" y1="810" x2="600" y2="940"/>
