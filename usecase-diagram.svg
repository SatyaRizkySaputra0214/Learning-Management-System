    <polygon points="1000,300 995,310 1005,310" fill="#CCC"/>
    <text x="1010" y="315" font-family="Arial" font-size="9" fill="#CCC">&lt;&lt;include&gt;&gt;</text>
    
    <!-- Kelola Kelas -> Enrollment -->
