  <!-- INCLUDE RELATIONSHIPS with arrows -->
  <g stroke="#CCC" stroke-width="1" stroke-dasharray="4,3">
    <!-- Kelola Pertemuan -> Buat Kuis -->
    <line x1="455" y1="720" x2="605" y2="720"/>
    <polygon points="605,720 595,715 595,725" fill="#CCC"/>
    <text x="520" y="710" font-family="Arial" font-size="9" fill="#CCC">&lt;&lt;include&gt;&gt;</text>
    
    <!-- Kelola Pertemuan -> Attendance -->
    <line x1="455" y1="730" x2="875" y2="830"/>
    <polygon points="875,830 865,825 865,835" fill="#CCC"/>
    
    <!-- Generate Sertifikat -> Generate Rapor -->
    <line x1="455" y1="940" x2="610" y2="940"/>
    <polygon points="610,940 600,935 600,945" fill="#CCC"/>
    <text x="520" y="930" font-family="Arial" font-size="9" fill="#CCC">&lt;&lt;include&gt;&gt;</text>
    
    <!-- Upload Bukti -> Register -->
